# qriter 本地开发依赖（Postgres + Redis）。
# - 启停：`pnpm dev:db:up` / `pnpm dev:db:down` / `pnpm dev:db:reset`
# - 日志：`pnpm dev:db:logs`
# - server 配置见 apps/server/config/application.yml（database.host=localhost、port=5433）
# - Redis 可选：application.yml 的 redis.url（默认注释掉 → memory 兜底）；本地宿主端口 6380
# 详见 infra/dev/README.md
services:
  postgres:
    image: postgres:16-alpine
    container_name: qriter-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qriter
      POSTGRES_PASSWORD: qriter
      POSTGRES_DB: qriter
    ports:
      # 宿主映射 5433（避免与本机其它项目的 postgres 5432 冲突）；容器内仍 5432
      - "5433:5432"
    volumes:
      - qriter-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qriter -d qriter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qriter-dev-redis
    restart: unless-stopped
    ports:
      # 宿主映射 6380（避免与本机其它项目的 redis 6379 冲突）；容器内仍 6379
      - "6380:6379"
    volumes:
      - qriter-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qriter-dev-postgres-data:
  qriter-dev-redis-data:
