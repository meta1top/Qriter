# qriter 生产形态 docker-compose 编排（postgres + redis + server）。
#
# 用法（在 repo root）：
#   cp infra/prod/.env.prod.example infra/prod/.env.prod
#   # 改 .env.prod 里的 secret
#   docker compose -f infra/prod/docker-compose.prod.yml --env-file infra/prod/.env.prod up -d
#
# 数据库迁移：
#   迁移在容器启动后手动跑一次（见 infra/prod/README.md「数据库迁移」节）。

services:
  postgres:
    image: postgres:16-alpine
    container_name: qriter-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 默认不暴露端口（仅容器网络内部访问）；如需 host 调试取消注释
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: qriter-prod-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # ports:
    #   - "6379:6379"

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    image: qriter/server:latest
    container_name: qriter-prod-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
    ports:
      - "${SERVER_PORT:-3000}:3000"

volumes:
  postgres-data:
  redis-data:
