# qriter 生产形态 docker-compose 编排（postgres + redis + server）。
#
# 用法：
#   cd infra/prod
#   cp .env.prod.example .env.prod     # 改 NACOS_* 连接 + POSTGRES_* 初始化密码
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 数据库迁移：
#   迁移在容器启动后手动跑一次（见 infra/prod/README.md「数据库迁移」节）。

services:
  postgres:
    image: postgres:16-alpine
    container_name: qriter-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 默认不暴露端口（仅容器网络内部访问）；如需 host 调试取消注释
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: qriter-prod-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # ports:
    #   - "6379:6379"

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    image: qriter/server:latest
    container_name: qriter-prod-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # server 只吃 Nacos 连接信息；node_env / port / database / jwt / redis / llm
    # 全在 Nacos 的 dataId 里。Nacos 配置需满足（与本 compose 拓扑一致）：
    #   node_env: production
    #   port: 3000                        # 与下面 ports 右侧、healthcheck 一致
    #   database: { host: postgres, port: 5432, username/password/database 同 POSTGRES_* }
    #   redis:    { url: redis://redis:6379 }
    environment:
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_DATA_ID: ${NACOS_DATA_ID:-qriter-server.yaml}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
    ports:
      - "${SERVER_PORT:-3000}:3000"

volumes:
  postgres-data:
  redis-data:
