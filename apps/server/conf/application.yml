# qriter server 本地开发配置（提交，含 localhost 默认值，pnpm dev 开箱即用）。
# 部署环境在 .env 配置 NACOS_SERVER_ADDR 后，本文件不会被读取（loader 走 Nacos 分支）。
# 个人覆盖：把要改的项写进 conf/application.local.yml（已 gitignore）。
#
# 配置为「多层级对象」，由 AppModule.forRoot(config) 分发：
#   database 整块透传给 TypeORM；jwt → 鉴权；redis → 锁/缓存/限流。
# 运行模式（dev/prod）不在这里 —— 取自 NODE_ENV（本地不设=dev，prod 镜像烤 production）。
port: 3000

# database 块直接映射 TypeORM DataSourceOptions（可按需追加 ssl / extra / poolSize / timezone 等）
database:
  type: postgres
  host: localhost
  port: 5432
  username: qriter
  password: qriter
  database: qriter
  synchronize: false
  autoLoadEntities: true
  logging:
    - error
    - warn
    - migration

jwt:
  secret: qriter-dev-secret-change-in-prod-min-16
  expires: 7d

# Redis：留空（整块注释掉）走 memory 兜底；本地起 redis（pnpm dev:db:up，端口 6380）后再启用。
# host / port / db / password 离散字段；db 默认 0，password 不填则无鉴权。
# redis:
#   host: localhost
#   port: 6380
#   db: 0
#   password: <redis-password>   # 开了 requirepass 才填

# LLM 凭证（agent 用）—— 配了从这里取，不需要任何环境变量。未配则 agent 暂不可跑模型。
# llm:
#   provider: deepseek        # anthropic / openai / deepseek
#   model: deepseek-chat
#   apiKey: sk-...
#   baseUrl: https://api.deepseek.com   # 可选；deepseek/openai 兼容端点的自定义地址

# Google OAuth（可选）—— 真实 clientId/clientSecret 写进 application.local.yml（已 gitignore）。
# redirectUri 须为合法 URL，故整块注释，避免空字符串触发 z.string().url() 校验失败。
# oauth:
#   google:
#     clientId: ""
#     clientSecret: ""
#     redirectUri: http://localhost:3001/auth/google
#     scopes: [openid, email, profile]
